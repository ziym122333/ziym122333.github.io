<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIYM FITNESS | Global Supplement Supplier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ccff00; --dark: #111; --gray: #222; }
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: #000; color: #fff; }
        
        /* 极致导航 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gray); }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; text-transform: uppercase; font-size: 14px; }
        .nav-links a:hover { color: var(--accent); }

        /* 极致首屏 */
        .hero { position: relative; height: 80vh; background: url('你的大图路径') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
        .hero-content { z-index: 1; max-width: 800px; }
        .hero h1 { font-size: 4rem; line-height: 1; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .hero h1 span { color: var(--accent); }
        .cta-btn { background: var(--accent); color: #000; padding: 18px 40px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 30px; border-radius: 5px; text-transform: uppercase; }

        /* 信任背书 (外贸核心) */
        .trust-bar { display: grid; grid-template-cols: repeat(4, 1fr); background: var(--gray); padding: 30px 5%; text-align: center; font-size: 12px; }
        .trust-item i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }

        /* 产品展示 */
        .products { padding: 80px 5%; background: #000; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 50px; }
        .grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--gray); border: 1px solid #333; padding: 20px; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card img { width: 100%; height: 250px; object-fit: contain; background: #fff; border-radius: 4px; }
        .card h3 { margin: 20px 0 10px; color: var(--accent); }

        /* 悬浮 WhatsApp */
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<nav>

        </div>
        </div>
</section>

<a href="https://wa.me/你的号码" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a >

</body>
</html>
